<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <title>Guias Samaritano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #222;
            --border-light: #333;
            --text: #fff;
            --text-muted: #888;
            --text-dim: #555;
            --white: #fff;
            --black: #000;
            --radius: 10px;
            --font-display: 'Syne', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 400;
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            padding: 32px 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .header-line {
            margin-top: 8px;
            font-size: 0.65rem;
            letter-spacing: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* ─── Tabs ─── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            border-bottom: 2px solid transparent;
            position: relative;
        }
        .tab.active {
            color: var(--white);
            border-bottom-color: var(--white);
        }

        /* ─── Screens ─── */
        .screen { display: none; }
        .screen.active { display: block; }

        /* ─── Form ─── */
        .form-section {
            padding: 20px 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .field {
            margin-bottom: 20px;
            position: relative;
        }
        .field label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .field input[type="text"],
        .field input[type="date"],
        .field input[type="number"],
        .field input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 300;
            transition: border-color 0.2s;
            outline: none;
        }
        .field input:focus {
            border-color: var(--white);
        }
        .field input::placeholder {
            color: var(--text-dim);
        }
        .field input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* ─── Autocomplete ─── */
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: #111;
            border: 1px solid var(--border-light);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            max-height: 160px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .autocomplete-list.open { display: block; }
        .autocomplete-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            transition: background 0.15s, color 0.15s;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover,
        .autocomplete-item.highlighted {
            background: var(--white);
            color: var(--black);
        }

        /* ─── Calendar ─── */
        .calendar-section {
            margin-bottom: 20px;
        }
        .calendar-section > label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .calendar-nav button {
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .calendar-nav button:hover {
            border-color: var(--white);
        }
        .cal-month-label {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .weekday-shortcuts {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .weekday-btn {
            flex: 1;
            padding: 6px 2px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: var(--font-body);
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .weekday-btn:hover {
            border-color: var(--white);
            color: var(--white);
        }
        .weekday-btn.active {
            background: var(--white);
            color: var(--black);
            border-color: var(--white);
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .cal-hdr {
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 4px 0 8px;
            font-weight: 500;
        }
        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 400;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-muted);
            border: 1px solid transparent;
        }
        .cal-day:hover {
            border-color: var(--border-light);
        }
        .cal-day.selected {
            background: var(--white);
            color: var(--black);
            font-weight: 600;
        }
        .cal-day.empty {
            cursor: default;
        }
        .cal-day.empty:hover {
            border-color: transparent;
        }

        /* ─── Selected dates chips ─── */
        .selected-dates {
            margin-top: 14px;
        }
        .selected-dates-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-body);
        }
        .chip-x {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1;
            transition: color 0.15s;
        }
        .chip-x:hover { color: var(--white); }
        .no-dates {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* ─── Submit Button ─── */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--white);
            color: var(--black);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ─── Guias Screen ─── */
        .guias-section {
            padding: 20px 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .guias-filter {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        .guias-filter input[type="date"] {
            flex: 1;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
        }
        .guias-filter input[type="date"]:focus { border-color: var(--white); }
        .guias-filter input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-copy {
            padding: 10px 16px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text);
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn-copy:hover { border-color: var(--white); }
        .btn-copy.copied { background: var(--white); color: var(--black); }

        .btn-all {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.15s;
        }
        .btn-all:hover { border-color: var(--white); color: var(--white); }
        .btn-all.active { background: var(--white); color: var(--black); border-color: var(--white); }

        .guia-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        .guia-card-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .guia-card-row:last-child { margin-bottom: 0; }
        .guia-card-label {
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 500;
        }
        .guia-card-value {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 300;
            text-align: right;
        }
        .guia-card-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .btn-delete {
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.15s;
        }
        .btn-delete:hover { border-color: #ff4444; color: #ff4444; }

        .guias-count {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .guias-count strong { color: var(--white); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        .empty-state p { font-size: 0.85rem; letter-spacing: 1px; }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--white);
            color: var(--black);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            z-index: 999;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ─── Confirm Modal ─── */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-box {
            background: #111;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .confirm-box p {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .confirm-actions { display: flex; gap: 10px; }
        .confirm-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-confirm-cancel {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
        }
        .btn-confirm-ok {
            background: var(--white);
            border: none;
            color: var(--black);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Guias</h1>
        <div class="header-line">Samaritano</div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="nova" onclick="switchTab('nova')">Nova Guia</button>
        <button class="tab" data-tab="guias" onclick="switchTab('guias')">Guias do Dia</button>
    </div>

    <!-- ═══ Tela: Nova Guia ═══ -->
    <div id="screen-nova" class="screen active">
        <div class="form-section">
            <div class="field">
                <label>Carteirinha — Nome</label>
                <input type="text" id="carteirinha" placeholder="123456 — João Silva" autocomplete="off">
                <div class="autocomplete-list" id="ac-carteirinha"></div>
            </div>

            <div class="field">
                <label>Especialidade — Profissional</label>
                <input type="text" id="especialidade" placeholder="Cardiologia — Dr. Pedro" autocomplete="off">
                <div class="autocomplete-list" id="ac-especialidade"></div>
            </div>

            <div class="field">
                <label>Data de Nascimento</label>
                <input type="date" id="nascimento">
            </div>

            <div class="field">
                <label>Senha</label>
                <input type="text" id="senha" placeholder="Senha da guia">
            </div>

            <div class="calendar-section">
                <label>Datas</label>
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)" aria-label="Mês anterior">&#8249;</button>
                    <span class="cal-month-label" id="monthLabel"></span>
                    <button onclick="changeMonth(1)" aria-label="Próximo mês">&#8250;</button>
                </div>
                <div id="weekdayShortcuts" class="weekday-shortcuts"></div>
                <div id="calGrid" class="cal-grid"></div>
                <div class="selected-dates" id="selectedDatesArea"></div>
            </div>

            <button class="btn-submit" onclick="saveGuias()">Salvar Guias</button>
        </div>
    </div>

    <!-- ═══ Tela: Guias do Dia ═══ -->
    <div id="screen-guias" class="screen">
        <div class="guias-section">
            <div class="guias-filter">
                <input type="date" id="filterDate" onchange="showFiltered()">
                <button class="btn-copy" id="btnCopy" onclick="copyGuias()">Copiar</button>
            </div>
            <button class="btn-all" id="btnAll" onclick="toggleShowAll()">Ver Todas</button>
            <div class="guias-count" id="guiasCount"></div>
            <div id="guiasList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMsg">Tem certeza?</p>
            <div class="confirm-actions">
                <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
                <button class="btn-confirm-ok" onclick="confirmAction()">Excluir</button>
            </div>
        </div>
    </div>

<script>
/* ═══ State ═══ */
var KEYS = {
    data: 'guias_data',
    carteirinhas: 'guias_carteirinhas',
    especialidades: 'guias_especialidades'
};

var selectedDates = {};  // { "2026-04-07": true }
var curYear, curMonth;   // 0-indexed month
var pendingConfirm = null;
var showAllGuias = false;

var MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var WEEKDAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var WEEKDAY_SHORT = ['D','S','T','Q','Q','S','S'];

/* ═══ Init ═══ */
(function() {
    var today = new Date();
    if (today.getDate() >= 15) {
        curMonth = today.getMonth() + 1;
        curYear = today.getFullYear();
        if (curMonth > 11) { curMonth = 0; curYear++; }
    } else {
        curMonth = today.getMonth();
        curYear = today.getFullYear();
    }

    renderCalendar();
    setupAutocomplete('carteirinha', KEYS.carteirinhas);
    setupAutocomplete('especialidade', KEYS.especialidades);

    document.getElementById('filterDate').value = toISO(today);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
})();

/* ═══ Tabs ═══ */
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('screen-' + tab).classList.add('active');
    if (tab === 'guias') renderGuias();
}

/* ═══ Calendar ═══ */
function renderCalendar() {
    document.getElementById('monthLabel').textContent = MONTH_NAMES[curMonth] + ' ' + curYear;

    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    // Header row
    for (var h = 0; h < 7; h++) {
        var hc = document.createElement('div');
        hc.className = 'cal-hdr';
        hc.textContent = WEEKDAY_SHORT[h];
        grid.appendChild(hc);
    }

    // Empty cells before first day
    var firstDay = new Date(curYear, curMonth, 1).getDay();
    var daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

    for (var e = 0; e < firstDay; e++) {
        var empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
    }

    // Day cells
    for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = curYear + '-' + pad(curMonth + 1) + '-' + pad(d);
        var cell = document.createElement('div');
        cell.className = 'cal-day' + (selectedDates[dateStr] ? ' selected' : '');
        cell.textContent = d;
        cell.setAttribute('data-date', dateStr);
        cell.onclick = onDayClick;
        grid.appendChild(cell);
    }

    renderWeekdayButtons();
    renderSelectedChips();
}

function onDayClick() {
    var ds = this.getAttribute('data-date');
    if (selectedDates[ds]) {
        delete selectedDates[ds];
    } else {
        selectedDates[ds] = true;
    }
    renderCalendar();
}

function changeMonth(delta) {
    curMonth += delta;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0) { curMonth = 11; curYear--; }
    renderCalendar();
}

function renderWeekdayButtons() {
    var container = document.getElementById('weekdayShortcuts');
    container.innerHTML = '';

    for (var i = 0; i < 7; i++) {
        var btn = document.createElement('button');
        btn.className = 'weekday-btn';
        btn.textContent = WEEKDAY_NAMES[i];
        btn.setAttribute('data-day', i);

        var dates = getDatesOfWeekday(i);
        var allSel = dates.length > 0 && dates.every(function(d) { return selectedDates[d]; });
        if (allSel) btn.classList.add('active');

        btn.onclick = onWeekdayClick;
        container.appendChild(btn);
    }
}

function onWeekdayClick() {
    var dayIdx = parseInt(this.getAttribute('data-day'));
    var dates = getDatesOfWeekday(dayIdx);
    var allSel = dates.every(function(d) { return selectedDates[d]; });
    for (var i = 0; i < dates.length; i++) {
        if (allSel) {
            delete selectedDates[dates[i]];
        } else {
            selectedDates[dates[i]] = true;
        }
    }
    renderCalendar();
}

function getDatesOfWeekday(dayIndex) {
    var daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    var dates = [];
    for (var d = 1; d <= daysInMonth; d++) {
        if (new Date(curYear, curMonth, d).getDay() === dayIndex) {
            dates.push(curYear + '-' + pad(curMonth + 1) + '-' + pad(d));
        }
    }
    return dates;
}

function renderSelectedChips() {
    var area = document.getElementById('selectedDatesArea');
    var keys = Object.keys(selectedDates).sort();

    if (keys.length === 0) {
        area.innerHTML = '<div class="no-dates">Nenhuma data selecionada</div>';
        return;
    }

    var html = '<div class="selected-dates-label">' + keys.length + ' data' + (keys.length > 1 ? 's' : '') + ' selecionada' + (keys.length > 1 ? 's' : '') + '</div><div class="chips">';
    for (var i = 0; i < keys.length; i++) {
        var parts = keys[i].split('-');
        var label = parts[2] + '/' + parts[1];
        html += '<span class="chip">' + label + '<span class="chip-x" onclick="removeDate(\'' + keys[i] + '\')">&times;</span></span>';
    }
    html += '</div>';
    area.innerHTML = html;
}

function removeDate(ds) {
    delete selectedDates[ds];
    renderCalendar();
}

/* ═══ Autocomplete ═══ */
function setupAutocomplete(inputId, storageKey) {
    var input = document.getElementById(inputId);
    var list = document.getElementById('ac-' + inputId);
    var hlIdx = -1;

    function getMemory() {
        try { return JSON.parse(localStorage.getItem(storageKey) || '[]'); }
        catch(e) { return []; }
    }

    function showSuggestions() {
        var val = input.value.toLowerCase().trim();
        var items = getMemory().filter(function(item) { return item.toLowerCase().indexOf(val) !== -1; });
        if (items.length === 0 || val === '') {
            list.classList.remove('open');
            return;
        }
        var html = '';
        for (var i = 0; i < items.length; i++) {
            html += '<div class="autocomplete-item" data-val="' + escAttr(items[i]) + '">' + escHtml(items[i]) + '</div>';
        }
        list.innerHTML = html;
        list.classList.add('open');
        hlIdx = -1;

        var acItems = list.querySelectorAll('.autocomplete-item');
        for (var j = 0; j < acItems.length; j++) {
            acItems[j].onmousedown = function() {
                input.value = this.getAttribute('data-val');
                list.classList.remove('open');
            };
        }
    }

    input.addEventListener('input', showSuggestions);
    input.addEventListener('focus', showSuggestions);
    input.addEventListener('blur', function() {
        setTimeout(function() { list.classList.remove('open'); }, 150);
    });

    input.addEventListener('keydown', function(e) {
        var items = list.querySelectorAll('.autocomplete-item');
        if (!list.classList.contains('open') || items.length === 0) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            hlIdx = Math.min(hlIdx + 1, items.length - 1);
            for (var i = 0; i < items.length; i++) items[i].classList.toggle('highlighted', i === hlIdx);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            hlIdx = Math.max(hlIdx - 1, 0);
            for (var i = 0; i < items.length; i++) items[i].classList.toggle('highlighted', i === hlIdx);
        } else if (e.key === 'Enter' && hlIdx >= 0) {
            e.preventDefault();
            input.value = items[hlIdx].getAttribute('data-val');
            list.classList.remove('open');
        }
    });
}

function saveToMemory(storageKey, value) {
    if (!value.trim()) return;
    var items = [];
    try { items = JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch(e) {}
    if (items.indexOf(value.trim()) === -1) {
        items.push(value.trim());
        localStorage.setItem(storageKey, JSON.stringify(items));
    }
}

/* ═══ Save ═══ */
function saveGuias() {
    var carteirinha = document.getElementById('carteirinha').value.trim();
    var especialidade = document.getElementById('especialidade').value.trim();
    var nascimento = document.getElementById('nascimento').value;
    var senha = document.getElementById('senha').value.trim();
    if (!carteirinha || !especialidade || !nascimento || !senha) {
        showToast('Preencha todos os campos');
        return;
    }
    var dateKeys = Object.keys(selectedDates).sort();
    if (dateKeys.length === 0) {
        showToast('Selecione ao menos uma data');
        return;
    }

    saveToMemory(KEYS.carteirinhas, carteirinha);
    saveToMemory(KEYS.especialidades, especialidade);

    var guias = [];
    try { guias = JSON.parse(localStorage.getItem(KEYS.data) || '[]'); } catch(e) {}

    for (var i = 0; i < dateKeys.length; i++) {
        guias.push({
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5) + i,
            carteirinha: carteirinha,
            especialidade: especialidade,
            nascimento: nascimento,
            senha: senha,

            data: dateKeys[i],
            criadoEm: new Date().toISOString()
        });
    }

    localStorage.setItem(KEYS.data, JSON.stringify(guias));

    document.getElementById('carteirinha').value = '';
    document.getElementById('especialidade').value = '';
    document.getElementById('nascimento').value = '';
    document.getElementById('senha').value = '';

    selectedDates = {};
    renderCalendar();

    showToast(dateKeys.length + ' guia' + (dateKeys.length > 1 ? 's' : '') + ' salva' + (dateKeys.length > 1 ? 's' : ''));
}

/* ═══ Guias do Dia ═══ */
function showFiltered() {
    showAllGuias = false;
    document.getElementById('btnAll').classList.remove('active');
    document.getElementById('btnAll').textContent = 'Ver Todas';
    renderGuias();
}

function toggleShowAll() {
    showAllGuias = !showAllGuias;
    var btn = document.getElementById('btnAll');
    btn.classList.toggle('active', showAllGuias);
    btn.textContent = showAllGuias ? 'Ver por Data' : 'Ver Todas';
    renderGuias();
}

function renderGuias() {
    var allGuias = [];
    try { allGuias = JSON.parse(localStorage.getItem(KEYS.data) || '[]'); } catch(e) {}

    var filtered;
    if (showAllGuias) {
        filtered = allGuias.slice().sort(function(a, b) {
            return (b.criadoEm || '').localeCompare(a.criadoEm || '');
        });
    } else {
        var filterDate = document.getElementById('filterDate').value;
        filtered = allGuias.filter(function(g) { return g.data === filterDate; });
    }

    var countEl = document.getElementById('guiasCount');
    var listEl = document.getElementById('guiasList');
    var copyBtn = document.getElementById('btnCopy');

    countEl.innerHTML = filtered.length > 0
        ? '<strong>' + filtered.length + '</strong> guia' + (filtered.length > 1 ? 's' : '')
        : '';

    copyBtn.style.display = filtered.length > 0 ? '' : 'none';

    if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><div class="icon">—</div><p>' + (showAllGuias ? 'Nenhuma guia cadastrada' : 'Nenhuma guia para esta data') + '</p></div>';
        return;
    }

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var g = filtered[i];
        html += '<div class="guia-card">' +
            row('Carteirinha', g.carteirinha) +
            row('Especialidade', g.especialidade) +
            row('Nascimento', toBR(g.nascimento)) +
            row('Senha', g.senha) +
            row('Data', toBR(g.data)) +
            '<div class="guia-card-actions"><button class="btn-delete" onclick="deleteGuia(\'' + g.id + '\')">Excluir</button></div>' +
            '</div>';
    }
    listEl.innerHTML = html;
}

function row(label, value) {
    return '<div class="guia-card-row"><span class="guia-card-label">' + label + '</span><span class="guia-card-value">' + escHtml(String(value)) + '</span></div>';
}

/* ═══ Copy ═══ */
function copyGuias() {
    var filterDate = document.getElementById('filterDate').value;
    var allGuias = [];
    try { allGuias = JSON.parse(localStorage.getItem(KEYS.data) || '[]'); } catch(e) {}
    var filtered = allGuias.filter(function(g) { return g.data === filterDate; });
    if (filtered.length === 0) return;

    var lines = [];
    for (var i = 0; i < filtered.length; i++) {
        var g = filtered[i];
        lines.push(
            'Guia ' + (i + 1) + '\n' +
            'Carteirinha: ' + g.carteirinha + '\n' +
            'Especialidade: ' + g.especialidade + '\n' +
            'Nascimento: ' + toBR(g.nascimento) + '\n' +
            'Senha: ' + g.senha + '\n' +
            'Data: ' + toBR(g.data)
        );
    }

    navigator.clipboard.writeText(lines.join('\n\n')).then(function() {
        var btn = document.getElementById('btnCopy');
        btn.textContent = 'Copiado!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1500);
    });
}

/* ═══ Delete ═══ */
function deleteGuia(id) {
    pendingConfirm = id;
    document.getElementById('confirmMsg').textContent = 'Excluir esta guia?';
    document.getElementById('confirmOverlay').classList.add('open');
}

function confirmAction() {
    if (!pendingConfirm) return;
    var guias = [];
    try { guias = JSON.parse(localStorage.getItem(KEYS.data) || '[]'); } catch(e) {}
    guias = guias.filter(function(g) { return g.id !== pendingConfirm; });
    localStorage.setItem(KEYS.data, JSON.stringify(guias));
    pendingConfirm = null;
    closeConfirm();
    renderGuias();
    showToast('Guia excluída');
}

function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
    pendingConfirm = null;
}

/* ═══ Utils ═══ */
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function toISO(date) {
    return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
}

function toBR(iso) {
    if (!iso) return '';
    var p = iso.split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function escAttr(s) {
    return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
}
</script>
