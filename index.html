<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <title>Guias Samaritano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #222;
            --border-light: #333;
            --text: #fff;
            --text-muted: #888;
            --text-dim: #555;
            --white: #fff;
            --black: #000;
            --radius: 10px;
            --font-display: 'Syne', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 400;
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            padding: 32px 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .header-line {
            margin-top: 8px;
            font-size: 0.65rem;
            letter-spacing: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* ─── Tabs ─── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            border-bottom: 2px solid transparent;
            position: relative;
        }
        .tab.active {
            color: var(--white);
            border-bottom-color: var(--white);
        }

        /* ─── Screens ─── */
        .screen { display: none; }
        .screen.active { display: block; }

        /* ─── Form ─── */
        .form-section {
            padding: 20px 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .field {
            margin-bottom: 20px;
            position: relative;
        }
        .field label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .field input[type="text"],
        .field input[type="date"],
        .field input[type="number"],
        .field input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 300;
            transition: border-color 0.2s;
            outline: none;
        }
        .field input:focus {
            border-color: var(--white);
        }
        .field input::placeholder {
            color: var(--text-dim);
        }
        /* Fix date input color on dark bg */
        .field input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* ─── Autocomplete ─── */
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: #111;
            border: 1px solid var(--border-light);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            max-height: 160px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .autocomplete-list.open { display: block; }
        .autocomplete-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            transition: background 0.15s, color 0.15s;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover,
        .autocomplete-item.highlighted {
            background: var(--white);
            color: var(--black);
        }

        /* ─── Calendar ─── */
        .calendar-section {
            margin-bottom: 20px;
        }
        .calendar-section > label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .calendar-nav button {
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .calendar-nav button:hover {
            border-color: var(--white);
        }
        .calendar-month {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .weekday-shortcuts {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .weekday-btn {
            flex: 1;
            min-width: 38px;
            padding: 6px 2px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: var(--font-body);
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .weekday-btn:hover {
            border-color: var(--white);
            color: var(--white);
        }
        .weekday-btn.active {
            background: var(--white);
            color: var(--black);
            border-color: var(--white);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-header-cell {
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 4px 0 8px;
            font-weight: 500;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 400;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-muted);
            border: 1px solid transparent;
        }
        .calendar-day:hover {
            border-color: var(--border-light);
        }
        .calendar-day.selected {
            background: var(--white);
            color: var(--black);
            font-weight: 600;
        }
        .calendar-day.empty {
            cursor: default;
        }
        .calendar-day.empty:hover {
            border-color: transparent;
        }

        .selected-count {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .selected-count strong {
            color: var(--white);
            font-weight: 600;
        }

        /* ─── Submit Button ─── */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--white);
            color: var(--black);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ─── Guias Screen ─── */
        .guias-section {
            padding: 20px 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .guias-filter {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        .guias-filter input[type="date"] {
            flex: 1;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
        }
        .guias-filter input[type="date"]:focus {
            border-color: var(--white);
        }
        .guias-filter input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .btn-copy {
            padding: 10px 16px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text);
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn-copy:hover {
            border-color: var(--white);
        }
        .btn-copy.copied {
            background: var(--white);
            color: var(--black);
        }

        .guia-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        .guia-card-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .guia-card-row:last-child { margin-bottom: 0; }
        .guia-card-label {
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 500;
        }
        .guia-card-value {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 300;
            text-align: right;
        }
        .guia-card-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .btn-delete {
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.15s;
        }
        .btn-delete:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .guias-count {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .guias-count strong {
            color: var(--white);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--white);
            color: var(--black);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            z-index: 999;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ─── Confirm Modal ─── */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-box {
            background: #111;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .confirm-box p {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .confirm-actions {
            display: flex;
            gap: 10px;
        }
        .confirm-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-confirm-cancel {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
        }
        .btn-confirm-ok {
            background: var(--white);
            border: none;
            color: var(--black);
        }

        /* ─── Animations ─── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Guias</h1>
        <div class="header-line">Samaritano</div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="nova" onclick="switchTab('nova')">Nova Guia</button>
        <button class="tab" data-tab="guias" onclick="switchTab('guias')">Guias do Dia</button>
    </div>

    <!-- ═══ Tela: Nova Guia ═══ -->
    <div id="screen-nova" class="screen active">
        <div class="form-section">
            <div class="field">
                <label>Carteirinha — Nome</label>
                <input type="text" id="carteirinha" placeholder="123456 — João Silva" autocomplete="off">
                <div class="autocomplete-list" id="ac-carteirinha"></div>
            </div>

            <div class="field">
                <label>Especialidade — Profissional</label>
                <input type="text" id="especialidade" placeholder="Cardiologia — Dr. Pedro" autocomplete="off">
                <div class="autocomplete-list" id="ac-especialidade"></div>
            </div>

            <div class="field">
                <label>Data de Nascimento</label>
                <input type="date" id="nascimento">
            </div>

            <div class="field">
                <label>Senha</label>
                <input type="text" id="senha" placeholder="Senha da guia">
            </div>

            <div class="field">
                <label>Quantidade</label>
                <input type="number" id="quantidade" value="1" min="1">
            </div>

            <div class="calendar-section">
                <label>Datas</label>
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)" aria-label="Mês anterior">&#8249;</button>
                    <span class="calendar-month" id="calendarMonth"></span>
                    <button onclick="changeMonth(1)" aria-label="Próximo mês">&#8250;</button>
                </div>
                <div class="weekday-shortcuts" id="weekdayShortcuts"></div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="selected-count" id="selectedCount"></div>
            </div>

            <button class="btn-submit" id="btnSave" onclick="saveGuias()">Salvar Guias</button>
        </div>
    </div>

    <!-- ═══ Tela: Guias do Dia ═══ -->
    <div id="screen-guias" class="screen">
        <div class="guias-section">
            <div class="guias-filter">
                <input type="date" id="filterDate" onchange="renderGuias()">
                <button class="btn-copy" id="btnCopy" onclick="copyGuias()">Copiar</button>
            </div>
            <div class="guias-count" id="guiasCount"></div>
            <div id="guiasList"></div>
        </div>
    </div>

    <!-- ═══ Toast ═══ -->
    <div class="toast" id="toast"></div>

    <!-- ═══ Confirm Modal ═══ -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMsg">Tem certeza?</p>
            <div class="confirm-actions">
                <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
                <button class="btn-confirm-ok" id="btnConfirmOk" onclick="confirmAction()">Excluir</button>
            </div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
const KEYS = {
    data: 'guias_data',
    carteirinhas: 'guias_carteirinhas',
    especialidades: 'guias_especialidades'
};

let selectedDates = new Set();
let calendarYear, calendarMonth; // 0-indexed month
let pendingConfirm = null;

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
(function init() {
    const today = new Date();
    if (today.getDate() >= 15) {
        calendarMonth = today.getMonth() + 1;
        calendarYear = today.getFullYear();
        if (calendarMonth > 11) {
            calendarMonth = 0;
            calendarYear++;
        }
    } else {
        calendarMonth = today.getMonth();
        calendarYear = today.getFullYear();
    }

    renderCalendar();
    setupAutocomplete('carteirinha', KEYS.carteirinhas);
    setupAutocomplete('especialidade', KEYS.especialidades);

    // Set filter date to today
    document.getElementById('filterDate').value = formatDateISO(today);

    // Service worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
})();

// ═══════════════════════════════════════
// Tabs
// ═══════════════════════════════════════
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + tab).classList.add('active');
    if (tab === 'guias') renderGuias();
}

// ═══════════════════════════════════════
// Calendar
// ═══════════════════════════════════════
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WEEKDAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const WEEKDAY_SHORT = ['D','S','T','Q','Q','S','S'];

function renderCalendar() {
    document.getElementById('calendarMonth').textContent = MONTH_NAMES[calendarMonth] + ' ' + calendarYear;

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    // Header
    WEEKDAY_SHORT.forEach(d => {
        const cell = document.createElement('div');
        cell.className = 'calendar-header-cell';
        cell.textContent = d;
        grid.appendChild(cell);
    });

    // Days
    const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
    const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-day empty';
        grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const cell = document.createElement('div');
        cell.className = 'calendar-day' + (selectedDates.has(dateStr) ? ' selected' : '');
        cell.textContent = d;
        cell.onclick = () => toggleDate(dateStr);
        grid.appendChild(cell);
    }

    renderWeekdayShortcuts();
    updateSelectedCount();
}

function toggleDate(dateStr) {
    if (selectedDates.has(dateStr)) {
        selectedDates.delete(dateStr);
    } else {
        selectedDates.add(dateStr);
    }
    renderCalendar();
}

function changeMonth(delta) {
    calendarMonth += delta;
    if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
    if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
    // Clear selections when changing month (dates belong to specific months)
    selectedDates.clear();
    renderCalendar();
}

function renderWeekdayShortcuts() {
    const container = document.getElementById('weekdayShortcuts');
    container.innerHTML = '';
    const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

    WEEKDAY_NAMES.forEach((name, dayIndex) => {
        const btn = document.createElement('button');
        btn.className = 'weekday-btn';
        btn.textContent = name;

        // Check if all of this weekday are selected
        const datesOfDay = getDatesOfWeekday(dayIndex);
        const allSelected = datesOfDay.length > 0 && datesOfDay.every(d => selectedDates.has(d));
        if (allSelected && datesOfDay.length > 0) btn.classList.add('active');

        btn.onclick = () => toggleWeekday(dayIndex);
        container.appendChild(btn);
    });
}

function getDatesOfWeekday(dayIndex) {
    const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
    const dates = [];
    for (let d = 1; d <= daysInMonth; d++) {
        const dt = new Date(calendarYear, calendarMonth, d);
        if (dt.getDay() === dayIndex) {
            dates.push(`${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
        }
    }
    return dates;
}

function toggleWeekday(dayIndex) {
    const dates = getDatesOfWeekday(dayIndex);
    const allSelected = dates.every(d => selectedDates.has(d));
    dates.forEach(d => {
        if (allSelected) selectedDates.delete(d);
        else selectedDates.add(d);
    });
    renderCalendar();
}

function updateSelectedCount() {
    const el = document.getElementById('selectedCount');
    const count = selectedDates.size;
    el.textContent = count === 0 ? 'Nenhuma data selecionada' : `${count} data${count > 1 ? 's' : ''} selecionada${count > 1 ? 's' : ''}`;
    if (count > 0) {
        el.innerHTML = `<strong>${count}</strong> data${count > 1 ? 's' : ''} selecionada${count > 1 ? 's' : ''}`;
    }
}

// ═══════════════════════════════════════
// Autocomplete
// ═══════════════════════════════════════
function setupAutocomplete(inputId, storageKey) {
    const input = document.getElementById(inputId);
    const list = document.getElementById('ac-' + inputId);
    let highlightIndex = -1;

    function getMemory() {
        return JSON.parse(localStorage.getItem(storageKey) || '[]');
    }

    function showSuggestions() {
        const val = input.value.toLowerCase().trim();
        const items = getMemory().filter(item => item.toLowerCase().includes(val));
        if (items.length === 0 || val === '') {
            list.classList.remove('open');
            return;
        }
        list.innerHTML = items.map((item, i) =>
            `<div class="autocomplete-item" onmousedown="selectAutocomplete('${inputId}', '${item.replace(/'/g, "\\'")}')">${item}</div>`
        ).join('');
        list.classList.add('open');
        highlightIndex = -1;
    }

    input.addEventListener('input', showSuggestions);
    input.addEventListener('focus', showSuggestions);
    input.addEventListener('blur', () => {
        setTimeout(() => list.classList.remove('open'), 150);
    });

    input.addEventListener('keydown', (e) => {
        const items = list.querySelectorAll('.autocomplete-item');
        if (!list.classList.contains('open') || items.length === 0) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
            items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIndex));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightIndex = Math.max(highlightIndex - 1, 0);
            items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIndex));
        } else if (e.key === 'Enter' && highlightIndex >= 0) {
            e.preventDefault();
            input.value = items[highlightIndex].textContent;
            list.classList.remove('open');
        }
    });
}

function selectAutocomplete(inputId, value) {
    document.getElementById(inputId).value = value;
    document.getElementById('ac-' + inputId).classList.remove('open');
}

function saveToMemory(storageKey, value) {
    if (!value.trim()) return;
    const items = JSON.parse(localStorage.getItem(storageKey) || '[]');
    if (!items.includes(value.trim())) {
        items.push(value.trim());
        localStorage.setItem(storageKey, JSON.stringify(items));
    }
}

// ═══════════════════════════════════════
// Save Guias
// ═══════════════════════════════════════
function saveGuias() {
    const carteirinha = document.getElementById('carteirinha').value.trim();
    const especialidade = document.getElementById('especialidade').value.trim();
    const nascimento = document.getElementById('nascimento').value;
    const senha = document.getElementById('senha').value.trim();
    const quantidade = parseInt(document.getElementById('quantidade').value) || 1;

    if (!carteirinha || !especialidade || !nascimento || !senha) {
        showToast('Preencha todos os campos');
        return;
    }
    if (selectedDates.size === 0) {
        showToast('Selecione ao menos uma data');
        return;
    }

    // Save to memory
    saveToMemory(KEYS.carteirinhas, carteirinha);
    saveToMemory(KEYS.especialidades, especialidade);

    // Create entries
    const guias = JSON.parse(localStorage.getItem(KEYS.data) || '[]');
    const sortedDates = [...selectedDates].sort();

    sortedDates.forEach(data => {
        guias.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
            carteirinha,
            especialidade,
            nascimento,
            senha,
            quantidade,
            data,
            criadoEm: new Date().toISOString()
        });
    });

    localStorage.setItem(KEYS.data, JSON.stringify(guias));

    // Reset form
    document.getElementById('carteirinha').value = '';
    document.getElementById('especialidade').value = '';
    document.getElementById('nascimento').value = '';
    document.getElementById('senha').value = '';
    document.getElementById('quantidade').value = '1';
    selectedDates.clear();
    renderCalendar();

    showToast(`${sortedDates.length} guia${sortedDates.length > 1 ? 's' : ''} salva${sortedDates.length > 1 ? 's' : ''}`);
}

// ═══════════════════════════════════════
// Guias do Dia
// ═══════════════════════════════════════
function renderGuias() {
    const filterDate = document.getElementById('filterDate').value;
    const allGuias = JSON.parse(localStorage.getItem(KEYS.data) || '[]');
    const filtered = allGuias.filter(g => g.data === filterDate);

    const countEl = document.getElementById('guiasCount');
    const listEl = document.getElementById('guiasList');
    const copyBtn = document.getElementById('btnCopy');

    countEl.innerHTML = filtered.length > 0
        ? `<strong>${filtered.length}</strong> guia${filtered.length > 1 ? 's' : ''}`
        : '';

    copyBtn.style.display = filtered.length > 0 ? '' : 'none';

    if (filtered.length === 0) {
        listEl.innerHTML = `
            <div class="empty-state">
                <div class="icon">—</div>
                <p>Nenhuma guia para esta data</p>
            </div>`;
        return;
    }

    listEl.innerHTML = filtered.map(g => `
        <div class="guia-card">
            <div class="guia-card-row">
                <span class="guia-card-label">Carteirinha</span>
                <span class="guia-card-value">${escapeHtml(g.carteirinha)}</span>
            </div>
            <div class="guia-card-row">
                <span class="guia-card-label">Especialidade</span>
                <span class="guia-card-value">${escapeHtml(g.especialidade)}</span>
            </div>
            <div class="guia-card-row">
                <span class="guia-card-label">Nascimento</span>
                <span class="guia-card-value">${formatDateBR(g.nascimento)}</span>
            </div>
            <div class="guia-card-row">
                <span class="guia-card-label">Senha</span>
                <span class="guia-card-value">${escapeHtml(g.senha)}</span>
            </div>
            <div class="guia-card-row">
                <span class="guia-card-label">Quantidade</span>
                <span class="guia-card-value">${g.quantidade}</span>
            </div>
            <div class="guia-card-actions">
                <button class="btn-delete" onclick="deleteGuia('${g.id}')">Excluir</button>
            </div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════
// Copy
// ═══════════════════════════════════════
function copyGuias() {
    const filterDate = document.getElementById('filterDate').value;
    const allGuias = JSON.parse(localStorage.getItem(KEYS.data) || '[]');
    const filtered = allGuias.filter(g => g.data === filterDate);

    if (filtered.length === 0) return;

    const text = filtered.map((g, i) =>
        `Guia ${i + 1}\n` +
        `Carteirinha: ${g.carteirinha}\n` +
        `Especialidade: ${g.especialidade}\n` +
        `Nascimento: ${formatDateBR(g.nascimento)}\n` +
        `Senha: ${g.senha}\n` +
        `Quantidade: ${g.quantidade}\n` +
        `Data: ${formatDateBR(g.data)}`
    ).join('\n\n');

    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = 'Copiado!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copiar';
            btn.classList.remove('copied');
        }, 1500);
    });
}

// ═══════════════════════════════════════
// Delete
// ═══════════════════════════════════════
function deleteGuia(id) {
    pendingConfirm = id;
    document.getElementById('confirmMsg').textContent = 'Excluir esta guia?';
    document.getElementById('confirmOverlay').classList.add('open');
}

function confirmAction() {
    if (pendingConfirm) {
        let guias = JSON.parse(localStorage.getItem(KEYS.data) || '[]');
        guias = guias.filter(g => g.id !== pendingConfirm);
        localStorage.setItem(KEYS.data, JSON.stringify(guias));
        pendingConfirm = null;
        closeConfirm();
        renderGuias();
        showToast('Guia excluída');
    }
}

function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
    pendingConfirm = null;
}

// ═══════════════════════════════════════
// Utils
// ═══════════════════════════════════════
function formatDateISO(date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function formatDateBR(isoStr) {
    if (!isoStr) return '';
    const [y, m, d] = isoStr.split('-');
    return `${d}/${m}/${y}`;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
}
